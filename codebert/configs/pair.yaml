task: pair
model_name: microsoft/graphcodebert-base

# Each snippet gets half the budget
max_seq_len: 512
max_dfg_nodes: 64       # 32 per snippet

# Optimization (warm-started from pointwise -> lower lr)
batch_size: 12
grad_accum: 2
lr: 1.0e-5
warmup_ratio: 0.1
weight_decay: 0.01
epochs: 30              # generous upper bound; patience is the real stopper
label_smoothing: 0.05
bf16: true
class_weights: none

# Eval / checkpointing
eval_every_steps: 200
patience: 3           # stop if val macro-F1 doesn't improve for this many evals in a row
min_delta: 1.0e-4     # improvements smaller than this don't count
seed: 42

# Logging
wandb_project: codebert-complexity
