model_name: microsoft/longcoder-base

# Sequence
max_seq_len: 4096
bridge_stride: 128

# Optimization (5090 / 32GB VRAM at seq_len 4096)
batch_size: 2
grad_accum: 16
lr: 2.0e-5
warmup_ratio: 0.15
weight_decay: 0.01
epochs: 50              # generous upper bound; patience is the real stopper
label_smoothing: 0.0
bf16: true
class_weights: auto        # auto | none | PATH to json of floats (11 values)
balanced_sampler: true     # WeightedRandomSampler on train; every batch ~class-balanced

# Eval / checkpointing
eval_every_steps: 200
patience: 3           # stop if val macro-F1 doesn't improve for this many evals in a row
min_delta: 1.0e-4     # improvements smaller than this don't count
seed: 42

# Logging
wandb_project: codebert-complexity
