# Encoder-recipe sweep driven by stacking/encoder_sweep.py.
#
# Each recipe runs:
#   1. oof_point.py     - 5 OOF folds + 1 full-train pointwise
#   2. semantic.py      - pair similarity from pooled vectors
#   3. stacking.sweep   - head grid (xgb / lgbm / mlp / stacked x seeds)
#
# After all recipes finish, encoder_sweep.py writes
# runs/heads/ENCODER_SUMMARY.md with the best test macro-F1 per recipe and
# picks a winner for HP search.

defaults: &defaults
  epochs: 40
  # Tuned for a 24 GB GPU (4090 / A10 / A5000) at seq 1024, full FT, bf16.
  # Live VRAM ~ 12-14 GB. On a 32 GB 5090 you can bump batch_size to 16 / ga 2.
  batch_size: 8
  grad_accum: 4             # effective batch 32
  num_workers: 4
  max_seq_len: 1024
  bridge_stride: 128        # 8 bridge tokens uniformly across the sequence
  eval_every_steps: 100
  patience: 3
  bf16: true
  extract_batch: 8
  lr: 2.0e-5

recipes:
  - name: full-ft-1024
    <<: *defaults
    note: "Full finetune, all 150M params trainable, seq 1024, bf16."

# Head sweep used after each recipe's OOF; same as stacking/configs/sweep.yaml.
head_sweep:
  config: stacking/configs/sweep.yaml
