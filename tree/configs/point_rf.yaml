# Point-task random forest config.
# Deployed on RunPod. RF is CPU-bound so a CPU pod is sufficient; the RTX 5090
# is wasted here. Reuse it for the codebert neural twin.

task: point

# Feature extraction
tree_sitter_language: python

# Data
max_code_chars: 20000          # skip pathologically long snippets
min_ast_nodes: 5               # skip empty / trivial snippets
dedup_by_sha256: true          # drop exact duplicates across sources
drop_multivar_when_codecomplex: true   # codecomplex has no multi-var labels; don't
                                       # inject O(m*n) etc. from that source

# Split
split_strategy: by_problem_id  # prevent leakage: same problem never spans splits
train_ratio: 0.80
val_ratio: 0.10
test_ratio: 0.10
seed: 42

# Random forest hyperparameters
rf:
  n_estimators: 500
  max_depth: null              # grow until leaves are pure or min_samples_leaf
  min_samples_split: 2
  min_samples_leaf: 2
  max_features: sqrt
  class_weight: balanced_subsample
  bootstrap: true
  n_jobs: -1
  random_state: 42

# Hyperparameter search (RandomizedSearchCV)
search:
  enabled: true
  n_iter: 20
  cv_folds: 5
  scoring: f1_macro
  distributions:
    n_estimators: [200, 300, 500, 800]
    max_depth: [null, 10, 20, 30]
    min_samples_leaf: [1, 2, 4]
    max_features: [sqrt, log2, 0.5]

# Ensembling (lightweight — 5 RFs with different seeds, majority vote)
ensemble:
  enabled: true
  n_seeds: 5
  seeds: [42, 1337, 2024, 99, 7]

# Eval
metrics:
  - accuracy
  - f1_macro
  - f1_weighted
  - precision_per_class
  - recall_per_class
  - confusion_matrix
